services:
  - type: web
    name: indevah-downloader-api
    env: python
    region: oregon
    plan: free
    buildCommand: chmod +x build.sh && bash build.sh
    startCommand: chmod +x start.sh && bash start.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: BGUTIL_PORT
        value: 4416
